<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Clash Web</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<div id="screen-home" class="screen active">
  <h1>⚔️ CLASH WEB</h1>
  <p class="subtitle">Duele com seu amigo em tempo real</p>

  <button id="btn-create" class="btn btn-primary">Criar Sala</button>

  <div class="divider">ou</div>

  <div class="join-row">
    <input id="input-code" type="text" maxlength="4" placeholder="CÓDIGO" autocomplete="off" />
    <button id="btn-join" class="btn btn-secondary">Entrar</button>
  </div>
  <p id="home-error" class="error"></p>
</div>

<div id="screen-waiting" class="screen">
  <h2>Sala criada!</h2>
  <p>Envie este código para seu amigo:</p>
  <div class="room-code" id="room-code-display">----</div>
  <button id="btn-copy" class="btn btn-secondary">Copiar código</button>
  <p class="waiting-msg">Aguardando o adversário entrar<span class="dots"></span></p>
</div>

<div id="screen-game" class="screen">
  <div id="hud-top">
    <div id="timer">3:00</div>
    <div id="double-elixir-badge" class="hidden">ELIXIR x2</div>
  </div>

  <div id="canvas-wrap">
    <canvas id="arena" width="360" height="600"></canvas>
  </div>

  <div id="hud-bottom">
    <div id="elixir-bar">
      <div id="elixir-fill"></div>
      <span id="elixir-count">5</span>
    </div>
    <div id="hand"></div>
  </div>
</div>

<div id="screen-end" class="screen">
  <h1 id="end-title">Vitória!</h1>
  <p id="end-subtitle"></p>
  <button id="btn-replay" class="btn btn-primary">Voltar ao início</button>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="constants.js"></script>
<script src="cards.js"></script>
<script src="client.js"></script>
</body>
</html>
