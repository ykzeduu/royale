<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Clash Royale Realtime Arena</title>
    <style>
        body { background: #141414; text-align: center; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 10px; }
        .screen { display: none; }
        .active { display: block; }
        input, button { padding: 12px; margin: 8px; font-size: 16px; border-radius: 8px; border: none; outline: none; }
        input { background: #2c3e50; color: white; text-align: center; width: 240px; border: 2px solid #34495e; }
        button { background: #2ecc71; color: white; font-weight: bold; cursor: pointer; box-shadow: 0 4px #27ae60; }
        button:hover { background: #27ae60; }
        button:active { transform: translateY(2px); box-shadow: 0 2px #219653; }
        .danger { background: #e74c3c; box-shadow: 0 4px #c0392b; }
        .danger:hover { background: #c0392b; }
        canvas { background: #45a247; border: 5px solid #2c3e50; border-radius: 16px; display: block; margin: 0 auto; box-shadow: 0 12px 24px rgba(0,0,0,0.6); }
        #lobbyList { max-width: 420px; margin: 15px auto; background: #1f1f1f; border-radius: 8px; padding: 5px; border: 1px solid #333; }
        .lobby-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #2a2a2a; }
        #elixirBarContainer { width: 390px; height: 16px; background: #333; margin: 10px auto; border-radius: 10px; border: 2px solid #fff; overflow: hidden; }
        #elixirBar { width: 0%; height: 100%; background: linear-gradient(90deg, #d904b5, #ff6ee6); }
        .deck { display: flex; justify-content: center; gap: 10px; margin-top: 8px; }
        .card { background: linear-gradient(135deg, #34495e, #2c3e50); padding: 10px; border-radius: 10px; border: 3px solid #7f8c8d; cursor: pointer; min-width: 85px; font-weight: bold; }
        .card.selected { border-color: #f1c40f; box-shadow: 0 0 12px #f1c40f; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div id="menuScreen" class="screen active">
        <h2>⚔️ Clash Royale Multiplayer ⚔️</h2>
        <input type="text" id="usernameInput" placeholder="Seu Nickname"><br>
        <button onclick="createLobby()">Criar Arena</button>
        <button onclick="joinRandom()">Partida Rápida</button>
        <br><br>
        <input type="text" id="lobbyIdInput" placeholder="Código da Arena">
        <button onclick="joinLobbyById()">Entrar na Arena</button>
        <h3>Arenas Ativas</h3>
        <div id="lobbyList">Buscando salas abertas...</div>
    </div>

    <div id="gameScreen" class="screen">
        <div id="lobbyWaitingInfo">
            <h2 id="lobbyTitle">CÓDIGO: -----</h2>
            <h3 style="color: #f1c40f;">Envie o código acima para seu amigo entrar!</h3>
        </div>

        <div id="gamePlayArea" style="display: none;">
            <h3 id="playerInfo" style="margin: 5px;">Carregando campo...</h3>
            <canvas id="gameCanvas" width="400" height="600"></canvas>
            <div id="elixirBarContainer"><div id="elixirBar"></div></div>
            <h4 id="elixirText" style="margin:2px; color:#ff85ec;">Elixir: 0/10</h4>
            
            <div class="deck">
                <div class="card selected" id="card-gigante" onclick="selectCard('gigante')">GIGANTE<br><span style="color:#ff5ee7">5 💧</span></div>
                <div class="card" id="card-arqueiro" onclick="selectCard('arqueiro')">ARQUEIRO<br><span style="color:#ff5ee7">3 💧</span></div>
                <div class="card" id="card-goblin" onclick="selectCard('goblin')">GOBLIN<br><span style="color:#ff5ee7">2 💧</span></div>
            </div>
        </div>
        <br>
        <button class="danger" onclick="leaveLobby()">Sair da Batalha</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(window.location.origin);
        let myRole = null;
        let selectedCard = 'gigante';

        function selectCard(type) {
            selectedCard = type;
            document.querySelectorAll('.card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`card-${type}`).classList.add('selected');
        }

        socket.on('update_lobby_list', (list) => {
            const listDiv = document.getElementById('lobbyList');
            if (list.length === 0) { listDiv.innerHTML = "Nenhuma arena esperando jogadores..."; return; }
            listDiv.innerHTML = "";
            list.forEach(l => {
                listDiv.innerHTML += `<div class="lobby-item"><span>⚔️ Host: <strong>${l.creator}</strong></span><button onclick="directJoin('${l.id}')">Guerrear</button></div>`;
            });
        });

        socket.on('lobby_created', (lobby) => {
            myRole = 'p1';
            showScreen('gameScreen');
            document.getElementById('lobbyTitle').innerText = `ID DA ARENA: ${lobby.id}`;
            document.getElementById('lobbyWaitingInfo').style.display = "block";
            document.getElementById('gamePlayArea').style.display = "none";
        });

        socket.on('game_start', (lobby) => {
            if (!myRole) myRole = 'p2';
            document.getElementById('lobbyWaitingInfo').style.display = "none";
            document.getElementById('gamePlayArea').style.display = "block";
            const p1 = lobby.players.find(p => p.role === 'p1').name;
            const p2 = lobby.players.find(p => p.role === 'p2').name;
            document.getElementById('playerInfo').innerText = myRole === 'p1' ? `🔵 ${p1} (Você) VS 🔴 ${p2}` : `🔴 ${p2} (Você) VS 🔵 ${p1}`;
        });

        socket.on('join_error', (msg) => alert(msg));
        socket.on('opponent_left', (msg) => { alert(msg); backToMenu(); });
        socket.on('game_over', (winner) => { alert(`Batalha Encerrada!\nVencedor: ${winner}`); backToMenu(); });

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        socket.on('game_update', (state) => {
            if (myRole) {
                let el = state.elixir[myRole];
                document.getElementById('elixirBar').style.width = `${(el / 10) * 100}%`;
                document.getElementById('elixirText').innerText = `Elixir: ${Math.floor(el)}/10`;
            }

            ctx.clearRect(0, 0, 400, 600);

            // RENDERIZAR ARENA (Se for Player 2, rotaciona 180° para que ele jogue na parte de baixo de sua própria tela)
            ctx.save();
            if (myRole === 'p2') {
                ctx.translate(200, 300);
                ctx.rotate(Math.PI);
                ctx.translate(-200, -300);
            }

            // Gramado
            for(let i=0; i<12; i++){
                ctx.fillStyle = i % 2 === 0 ? '#45a247' : '#4bb34f';
                ctx.fillRect(0, i*50, 400, 50);
            }

            // Rio Central
            ctx.fillStyle = '#2563eb'; ctx.fillRect(0, 285, 400, 30);
            
            // Duas Pontes
            ctx.fillStyle = '#4b5563';
            ctx.fillRect(55, 278, 50, 44);
            ctx.fillRect(295, 278, 50, 44);

            // Desenhar Torres
            for (let name in state.towers) {
                let t = state.towers[name];
                if (!t.alive) continue;

                let isP1 = name.startsWith('p1');
                let size = t.type === 'king' ? 44 : 32;

                ctx.fillStyle = isP1 ? '#1d4ed8' : '#b91c1c';
                ctx.fillRect(t.x - size/2, t.y - size/2, size, size);
                
                // Detalhe de Castelo
                ctx.fillStyle = '#9ca3af'; ctx.fillRect(t.x - size/2, t.y - size/2, size, 5);

                // Vida da Torre (Corrigida orientação do texto/barra)
                ctx.save();
                ctx.fillStyle = '#1e293b'; ctx.fillRect(t.x - 20, t.y - size/2 - 12, 40, 5);
                ctx.fillStyle = '#10b981'; ctx.fillRect(t.x - 20, t.y - size/2 - 12, 40 * (t.hp / t.maxHp), 5);
                ctx.restore();
            }

            // Desenhar Tropas
            state.troops.forEach(troop => {
                let isP1 = troop.owner === 'p1';
                
                if (troop.type === 'gigante') ctx.fillStyle = isP1 ? '#1e40af' : '#991b1b';
                else if (troop.type === 'arqueiro') ctx.fillStyle = isP1 ? '#06b6d4' : '#db2777';
                else ctx.fillStyle = isP1 ? '#10b981' : '#d97706';

                ctx.beginPath();
                ctx.arc(troop.x, troop.y, troop.size, 0, Math.PI * 2);
                ctx.fill();

                // Barra de Vida das Tropas
                ctx.fillStyle = '#1e293b'; ctx.fillRect(troop.x - 12, troop.y - troop.size - 8, 24, 4);
                ctx.fillStyle = '#10b981'; ctx.fillRect(troop.x - 12, troop.y - troop.size - 8, 24 * (troop.hp / troop.maxHp), 4);
            });

            ctx.restore(); // Restaura contexto normal do canvas
        });

        canvas.addEventListener('click', (e) => {
            if (!myRole) return;
            const rect = canvas.getBoundingClientRect();
            let clickX = e.clientX - rect.left;
            let clickY = e.clientY - rect.top;

            socket.emit('spawn_troop', { x: clickX, y: clickY, type: selectedCard });
        });

        function getUsername() {
            const name = document.getElementById('usernameInput').value.trim();
            if(!name) { alert("Escolha um Nickname!"); return null; }
            return name;
        }
        function createLobby() { const n = getUsername(); if(n) socket.emit('create_lobby', n); }
        function joinRandom() { const n = getUsername(); if(n) socket.emit('join_random', n); }
        function joinLobbyById() { const n = getUsername(); const id = document.getElementById('lobbyIdInput').value.trim(); if(n && id) socket.emit('join_lobby', { lobbyId: id, username: n }); }
        function directJoin(id) { const n = getUsername(); if(n) socket.emit('join_lobby', { lobbyId: id, username: n }); }
        function leaveLobby() { socket.emit('leave_lobby'); backToMenu(); }
        function backToMenu() { myRole = null; showScreen('menuScreen'); }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
    </script>
</body>
</html>
